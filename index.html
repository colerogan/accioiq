  }/*EDITMODE-END*/;
</script>

<script src="dist/Tweaks.js"></script>

<script>
function App() {
  const [state, setState] = React.useState(window.__AQ_TWEAKS__);
  const h = React.createElement;
  return h('div', {'data-screen-label': 'AccioIQ Homepage'},
    h(Nav),
    h(Hero, {accent: state.heroAccent}),
    h(Philosophy),
    h(Method, {darkBg: state.darkBg}),
    h(Registers),
    h(Beliefs, {darkBg: state.darkBg}),
    h(Cases, {layout: state.casesLayout}),
    h(Clients, {darkBg: state.darkBg}),
    h(Team),
    h(Contact, {darkBg: state.darkBg}),
    h(Footer),
    h(Tweaks, {state, setState})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
