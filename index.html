<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AccioIQ — AI from the inside out.</title>
<link rel="icon" href="assets/favicon.svg">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { background: var(--aq-parchment); }
  body { overflow-x: hidden; }
  html { scroll-behavior: smooth; }
  ::selection { background: var(--aq-teal); color: var(--aq-deep); }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--aq-teal-dark); outline-offset: 3px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
  window.__AQ_TWEAKS__ = /*EDITMODE-BEGIN*/{
    "heroAccent": "teal",
    "casesLayout": "cards",
    "darkBg": "deep"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

<script src="dist/responsive.js"></script>
<script src="dist/Nav.js"></script>
<script src="dist/Hero.js"></script>
<script src="dist/Philosophy.js"></script>
<script src="dist/Method.js"></script>
<script src="dist/Registers.js"></script>
<script src="dist/Beliefs.js"></script>
<script src="dist/Cases.js"></script>
<script src="dist/Clients.js"></script>
<script src="dist/Team.js"></script>
<script src="dist/Contact.js"></script>
<script src="dist/Footer.js"></script>
<script src="dist/Tweaks.js"></script>

<script>
function App() {
  const [state, setState] = React.useState(window.__AQ_TWEAKS__);
  const h = React.createElement;
  return h('div', {'data-screen-label': 'AccioIQ Homepage'},
    h(Nav),
    h(Hero, {accent: state.heroAccent}),
    h(Philosophy),
    h(Method, {darkBg: state.darkBg}),
    h(Registers),
    h(Beliefs, {darkBg: state.darkBg}),
    h(Cases, {layout: state.casesLayout}),
    h(Clients, {darkBg: state.darkBg}),
    h(Team),
    h(Contact, {darkBg: state.darkBg}),
    h(Footer),
    h(Tweaks, {state, setState})
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>
